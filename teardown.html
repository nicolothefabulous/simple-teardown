<style>
  :root{--bg:#0f1420;--card:#171d2b;--ink:#eef1f6;--mut:#9aa4b5;--line:#2a3346;--accent:#2A6FD6;--err:#ff6b61}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:radial-gradient(1200px 600px at 50% -10%,#1b2333,#0f1420);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:grid;place-items:center;min-height:100dvh;-webkit-font-smoothing:antialiased}
  .card{width:min(92vw,380px);background:var(--card);border:1px solid var(--line);border-radius:16px;
    padding:30px 28px 26px;box-shadow:0 24px 70px rgba(0,0,0,.5);text-align:center}
  .lock{width:46px;height:46px;border-radius:12px;background:#0f1420;border:1px solid var(--line);
    display:grid;place-items:center;margin:0 auto 16px}
  .lock svg{width:22px;height:22px;stroke:var(--accent)}
  h1{font-size:17px;font-weight:640;margin:0 0 4px;letter-spacing:-.01em}
  p.sub{font-size:12.5px;color:var(--mut);margin:0 0 20px;line-height:1.5}
  form{display:flex;flex-direction:column;gap:10px}
  input{width:100%;padding:12px 13px;border-radius:10px;border:1px solid var(--line);background:#0f1420;
    color:var(--ink);font-size:14px;outline:none;transition:border-color .15s}
  input:focus{border-color:var(--accent)}
  button{padding:12px;border:none;border-radius:10px;background:var(--accent);color:#fff;font-size:14px;
    font-weight:600;cursor:pointer}
  button:hover{background:#2560bd}
  button:disabled{opacity:.6;cursor:default}
  .err{color:var(--err);font-size:12.5px;min-height:16px;margin:2px 0 0}
  .foot{font-size:11px;color:#66707f;margin-top:16px;line-height:1.5}
</style></head>

  var SESSION_KEY='fab_simple_teardown_pw';
  var dec=new TextDecoder(), enc=new TextEncoder();
  function b64(s){var bin=atob(s),a=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a;}
  async function deriveKey(pw){
    var km=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
    return crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(SALT),iterations:200000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  }
  async function unlock(pw){
    var key=await deriveKey(pw);
    var pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(IV)},key,b64(PAYLOAD));
    var html=dec.decode(pt);
    try{sessionStorage.setItem(SESSION_KEY,pw);}catch(e){}
    document.open();document.write(html);document.close();
  }
  var f=document.getElementById('f'),pwEl=document.getElementById('pw'),err=document.getElementById('err'),go=document.getElementById('go');
  f.addEventListener('submit',async function(e){
    e.preventDefault();err.textContent='';go.disabled=true;go.textContent='Unlocking…';
    try{await unlock(pwEl.value);}
    catch(ex){err.textContent='Incorrect password.';go.disabled=false;go.textContent='Unlock';pwEl.select();}
  });
  // auto-unlock within the same browser session (so board <-> teardown links don't re-prompt)
  (async function(){
    var saved=null;try{saved=sessionStorage.getItem(SESSION_KEY);}catch(e){}
    if(saved){try{await unlock(saved);}catch(e){try{sessionStorage.removeItem(SESSION_KEY);}catch(_){}}}
  })();
